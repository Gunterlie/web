    <div class="avatar-wrap">
      <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
        <defs>
          <clipPath id="circle-clip">
            <circle cx="100" cy="100" r="95"/>
          </clipPath>
          <filter id="simplify" color-interpolation-filters="sRGB">
            <feColorMatrix type="saturate" values="0"/>
            <feComponentTransfer>
              <feFuncR type="discrete" tableValues="0.08 0.35 0.65 0.92"/>
              <feFuncG type="discrete" tableValues="0.08 0.35 0.65 0.92"/>
              <feFuncB type="discrete" tableValues="0.08 0.35 0.65 0.92"/>
            </feComponentTransfer>
          </filter>
          <filter id="glow">
            <feGaussianBlur stdDeviation="6" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
          </filter>
        </defs>
        <!-- glow ring -->
        <circle cx="100" cy="100" r="97" fill="none" stroke="rgba(180,180,220,0.15)" stroke-width="4" filter="url(#glow)"/>
        <!-- poster-ized avatar -->
        <image
          href="https://avatars.githubusercontent.com/u/16029542?v=4"
          x="0" y="0" width="200" height="200"
          clip-path="url(#circle-clip)"
          filter="url(#simplify)"
          preserveAspectRatio="xMidYMid slice"
        />
        <!-- subtle border ring -->
        <circle cx="100" cy="100" r="95" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
      </svg>
